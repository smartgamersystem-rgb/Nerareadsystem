<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NERA Oracle 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c; --gold-light:#f0d080; --gold-glow:#ffd700;
  --deep:#07040a; --deep-2:#0e0916; --crimson:#6b0000; --teal:#27ae7f; --cream:#f5ede0;
  --muted:rgba(201,168,76,.45); --line:rgba(201,168,76,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Cormorant Garamond',serif;
  background:linear-gradient(180deg,#07040a 0%,#0c0712 55%,#07040a 100%);
  color:var(--cream);
  overflow-x:hidden;
  min-height:100vh;
}
button,input,textarea,select{font:inherit}
.bg-layer,.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-layer{
  background:
  radial-gradient(ellipse 140% 55% at 50% 0%, rgba(107,0,0,.22) 0%, transparent 55%),
  radial-gradient(ellipse 75% 50% at 5% 92%, rgba(39,174,127,.1) 0%, transparent 50%),
  radial-gradient(ellipse 75% 50% at 95% 10%, rgba(201,168,76,.05) 0%, transparent 50%);
}
.stars{
  background-image:
  radial-gradient(1px 1px at 12% 14%,rgba(255,220,100,.9),transparent),
  radial-gradient(1px 1px at 31% 58%,rgba(255,255,255,.6),transparent),
  radial-gradient(1.5px 1.5px at 54% 12%,rgba(255,220,100,.8),transparent),
  radial-gradient(1px 1px at 72% 40%,rgba(255,255,255,.5),transparent),
  radial-gradient(1px 1px at 88% 68%,rgba(255,220,100,.7),transparent),
  radial-gradient(1px 1px at 4% 82%,rgba(255,255,255,.4),transparent),
  radial-gradient(1.5px 1.5px at 22% 92%,rgba(255,220,100,.6),transparent),
  radial-gradient(1px 1px at 63% 77%,rgba(255,255,255,.5),transparent),
  radial-gradient(2px 2px at 82% 8%,rgba(255,255,255,.7),transparent);
  animation:twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle{0%{opacity:.45}100%{opacity:1}}
.particle{position:fixed;width:3px;height:3px;border-radius:50%;pointer-events:none;z-index:0;animation:floatP linear forwards}
@keyframes floatP{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.85}
  90%{opacity:.55}
  100%{transform:translateY(-10vh) scale(1.6);opacity:0}
}
#app{position:relative;z-index:1;padding:0 16px 70px;max-width:1200px;margin:0 auto}
header{text-align:center;padding:50px 20px 26px}
.eye{display:block;font-size:44px;margin-bottom:8px;color:var(--gold);filter:drop-shadow(0 0 18px var(--gold));animation:pulseEye 3s ease-in-out infinite}
@keyframes pulseEye{0%,100%{filter:drop-shadow(0 0 10px var(--gold))}50%{filter:drop-shadow(0 0 30px var(--gold-glow))}}
h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(34px,7vw,78px);
  letter-spacing:7px;
  background:linear-gradient(135deg,#7a5500 0%,#c9a84c 30%,#f0d080 50%,#c9a84c 70%,#7a5500 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(201,168,76,.35));
}
.subtitle{font-style:italic;font-size:15px;letter-spacing:4px;color:rgba(201,168,76,.42);margin-top:8px;text-transform:uppercase}
.topbar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;border:1px solid rgba(201,168,76,.18);background:rgba(201,168,76,.06);font-size:12px;letter-spacing:1px;color:var(--gold-light)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px auto 20px;width:70%;max-width:520px}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.divider-sym{color:var(--gold);font-size:16px;opacity:.55}
.toolbar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:0 auto 24px}
.tab,.lang-btn,.btn-primary,.btn-secondary,.btn-ghost{cursor:pointer;border-radius:12px;transition:all .25s;font-family:'Cinzel Decorative',serif}
.tab,.lang-btn{padding:10px 20px;font-size:11px;letter-spacing:2px;border:1px solid rgba(201,168,76,.22);background:transparent;color:rgba(201,168,76,.5)}
.tab.active,.lang-btn:hover{background:rgba(201,168,76,.09);color:var(--gold);border-color:rgba(201,168,76,.45)}
.panel{background:linear-gradient(135deg,rgba(18,10,22,.97),rgba(12,7,16,.99));border:1px solid var(--line);border-radius:22px;padding:30px 24px;max-width:760px;margin:0 auto 24px;box-shadow:0 0 60px rgba(107,0,0,.08),inset 0 1px 0 rgba(201,168,76,.06);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(201,168,76,.02),transparent);pointer-events:none}
.panel-tag{display:block;text-align:center;font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:4px;color:rgba(201,168,76,.38);text-transform:uppercase;margin-bottom:18px}
.field{margin-bottom:16px}
label{display:block;text-align:left;font-size:11px;letter-spacing:2px;color:rgba(201,168,76,.48);text-transform:uppercase;margin-bottom:7px}
input[type="text"],input[type="date"],textarea,select{
  width:100%;padding:13px 16px;border-radius:12px;outline:none;
  border:1px solid rgba(201,168,76,.26);background:rgba(255,255,255,.04);
  color:var(--cream);font-size:17px;font-style:italic;
}
textarea{min-height:96px;resize:vertical;line-height:1.65}
input::placeholder,textarea::placeholder{color:rgba(201,168,76,.32)}
input:focus,textarea:focus,select:focus{border-color:var(--gold);background:rgba(201,168,76,.045);box-shadow:0 0 16px rgba(201,168,76,.08)}
.select-wrap{position:relative}
.select-wrap::after{content:'⌄';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gold);pointer-events:none;font-size:18px}
select{-webkit-appearance:none;appearance:none}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.btn-primary{padding:13px 28px;background:linear-gradient(135deg,#5a1010,#6b0000,#5a1010);color:var(--gold-light);border:1px solid rgba(201,168,76,.38);box-shadow:0 4px 18px rgba(107,0,0,.28);font-size:12px;letter-spacing:1px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(107,0,0,.45)}
.btn-secondary{padding:12px 22px;background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.28);font-size:12px;letter-spacing:1px}
.btn-secondary:hover,.btn-ghost:hover{background:rgba(201,168,76,.06);border-color:var(--gold);color:var(--gold)}
.btn-ghost{padding:10px 18px;background:transparent;color:rgba(201,168,76,.42);border:1px solid rgba(201,168,76,.16);font-size:11px;letter-spacing:1px}
.steps{display:flex;justify-content:center;align-items:center;gap:8px;margin:0 auto 24px;max-width:320px}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,168,76,.22);font-family:'Cinzel Decorative',serif;font-size:11px;color:rgba(201,168,76,.28)}
.step-dot.done{background:rgba(201,168,76,.08);color:var(--gold);border-color:rgba(201,168,76,.42)}
.step-dot.active{background:rgba(107,0,0,.28);color:var(--gold-light);border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.18)}
.step-line{flex:1;height:1px;background:rgba(201,168,76,.12)}
.oracle-out{display:none;max-width:760px;margin:0 auto;background:linear-gradient(160deg,rgba(12,7,16,.98),rgba(18,10,22,.99));border:1px solid rgba(201,168,76,.2);border-radius:22px;overflow:hidden}
.oracle-out.visible{display:block;animation:fadeUp .55s ease}
.oracle-banner{background:linear-gradient(135deg,rgba(107,0,0,.5),rgba(25,10,38,.92));padding:26px 24px 20px;border-bottom:1px solid rgba(201,168,76,.12);text-align:center}
.oracle-card-img{width:180px;max-width:90%;border-radius:14px;display:none;margin:0 auto 18px;box-shadow:0 0 26px rgba(0,0,0,.45);border:1px solid rgba(201,168,76,.22)}
.oracle-archetype{font-family:'Cinzel Decorative',serif;font-size:21px;color:var(--gold-light);letter-spacing:3px;margin-bottom:4px}
.oracle-role{font-style:italic;font-size:13px;letter-spacing:3px;color:rgba(201,168,76,.5)}
.oracle-fields{padding:22px 24px}
.o-field{text-align:left;border-left:2px solid rgba(201,168,76,.18);padding-left:16px;margin-bottom:22px}
.o-field.msg{border-color:rgba(201,168,76,.48)}
.o-field.shad{border-color:rgba(107,0,0,.6)}
.o-field.activ{border-color:rgba(39,174,127,.45)}
.o-field.next{border-color:rgba(201,168,76,.28)}
.o-lbl{display:block;font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:3px;color:var(--gold);opacity:.62;margin-bottom:8px}
.o-txt{font-size:17px;line-height:1.8;font-style:italic}
#seccionTarot{display:none}
#seccionTarot.visible{display:block;animation:fadeUp .5s ease}
#cartas{display:grid;justify-content:center;gap:13px;margin:24px auto;max-width:920px}
.grid3{grid-template-columns:repeat(3,140px)}
.grid5{grid-template-columns:repeat(5,128px)}
.grid7{grid-template-columns:repeat(7,110px)}
.grid22{grid-template-columns:repeat(7,108px)}
.carta{width:128px;height:232px;position:relative;overflow:hidden;border-radius:14px;box-shadow:0 8px 26px rgba(0,0,0,.62);cursor:pointer;transition:transform .2s}
.carta:hover{transform:translateY(-4px)}
.carta img{width:100%;height:196px;display:block;object-fit:cover;border-radius:14px}
.sombraCarta{position:absolute;top:0;left:0;width:100%;height:196px;border-radius:14px;background:radial-gradient(ellipse at center,rgba(40,0,25,.92) 0%,rgba(7,4,10,.98) 100%);animation:revela 1.15s forwards;animation-delay:4.3s}
.carta-glow{position:absolute;inset:-3px;border-radius:16px;background:linear-gradient(135deg,rgba(201,168,76,.42),rgba(107,0,0,.38),rgba(201,168,76,.42));z-index:-1;opacity:0;animation:cglow .8s forwards;animation-delay:5.05s}
.nombreCarta{font-size:11px;font-style:italic;margin-top:6px;color:var(--gold);display:none;line-height:1.3;text-align:center}
@keyframes torbellino{
  0%{transform:translateX(-480px) rotate(0deg) scale(.1);opacity:0}
  20%{transform:translateX(-180px) rotate(500deg) scale(.4);opacity:.4}
  65%{transform:translateX(50px) rotate(1050deg) scale(.88);opacity:.85}
  82%{transform:translateX(-8px) rotate(1250deg) scale(1.04);opacity:1}
  100%{transform:translateX(0) rotate(1440deg) scale(1);opacity:1}
}
@keyframes revela{0%{opacity:1}100%{opacity:0;pointer-events:none}}
@keyframes cglow{to{opacity:1}}
#resultado{display:none;margin:18px auto 0;width:92%;max-width:760px;background:linear-gradient(135deg,rgba(12,7,16,.97),rgba(18,10,22,.99));border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:24px 24px;text-align:left}
#resultado.visible{display:block;animation:fadeUp .55s ease}
.res-hdr{font-family:'Cinzel Decorative',serif;font-size:11px;color:var(--gold);letter-spacing:4px;text-align:center;margin-bottom:16px;opacity:.7}
#resultadoTexto{font-size:17px;line-height:1.85;font-style:italic;color:var(--cream)}
#instrucciones{width:92%;max-width:760px;margin:18px auto;background:linear-gradient(135deg,rgba(39,174,127,.06),rgba(12,7,16,.92));border:1px solid rgba(39,174,127,.16);border-radius:16px;color:rgba(168,230,211,.78);padding:20px 22px;text-align:left;font-size:14px;line-height:1.85}
.inst-title{font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:3px;color:var(--teal);margin-bottom:10px;opacity:.78}
.loading{display:flex;justify-content:center;gap:8px;padding:24px}
.loading span{width:9px;height:9px;background:var(--gold);border-radius:50%;animation:dotB 1.4s ease-in-out infinite}
.loading span:nth-child(2){animation-delay:.2s}.loading span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.28}40%{transform:scale(1);opacity:1}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,2,8,.92);z-index:999;justify-content:center;align-items:center;backdrop-filter:blur(10px);padding:18px}
.modal-overlay.open{display:flex;animation:fadeIn .3s ease}
.modal{background:linear-gradient(145deg,#0e0915,#160c1e,#0b0810);border:1px solid rgba(201,168,76,.26);border-radius:20px;padding:30px 28px;width:100%;max-width:520px;box-shadow:0 0 80px rgba(107,0,0,.28),inset 0 1px 0 rgba(201,168,76,.1);position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:rgba(201,168,76,.38);font-size:25px;cursor:pointer}
.modal-close:hover{color:var(--gold)}
.cd-num{font-family:'Cinzel Decorative',serif;font-size:10px;color:rgba(201,168,76,.38);letter-spacing:4px;margin-bottom:6px}
.cd-name{font-family:'Cinzel Decorative',serif;font-size:19px;color:var(--gold-light);letter-spacing:2px;margin-bottom:3px}
.cd-sub{font-style:italic;font-size:13px;color:rgba(201,168,76,.5);margin-bottom:18px;letter-spacing:2px}
.cd-block{text-align:left;margin-bottom:14px;border-left:2px solid rgba(201,168,76,.18);padding-left:15px}
.cd-lbl{font-size:10px;letter-spacing:3px;color:var(--gold);opacity:.58;margin-bottom:5px;display:block;text-transform:uppercase}
.cd-txt{font-size:15px;line-height:1.73;font-style:italic}
.cd-activ,.cd-anc{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:15px;line-height:1.68;font-style:italic}
.cd-activ{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.13);color:var(--gold-light)}
.cd-anc{background:rgba(39,174,127,.06);border:1px solid rgba(39,174,127,.13);color:rgba(168,230,211,.75)}
.cd-elem{display:inline-block;margin-top:12px;padding:4px 14px;border-radius:20px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);font-size:11px;letter-spacing:3px;color:var(--gold);opacity:.65}
.hidden{display:none !important}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:640px){
  .grid3{grid-template-columns:repeat(3,100px)}
  .grid5{grid-template-columns:repeat(3,100px)}
  .grid7{grid-template-columns:repeat(4,88px)}
  .grid22{grid-template-columns:repeat(4,82px)}
  .carta{width:86px;height:168px}
  .carta img,.sombraCarta{height:138px}
  .panel,.oracle-fields,#resultado{padding:18px 16px}
  .oracle-card-img{width:140px}
  .topbar{gap:8px}
}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="stars"></div>
<div id="app">
  <header>
    <span class="eye">𓂀</span>
    <h1>NERA Oracle</h1>
    <p class="subtitle" id="headerSubtitle">New Earth Role Activation · 2026</p>
    <div class="topbar">
      <span class="pill"><span class="status-dot"></span><span id="statusText">Lectura IA activa</span></span>
      <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">🌐 ES</button>
    </div>
  </header>

  <div class="divider"><div class="divider-line"></div><span class="divider-sym">✦</span><div class="divider-line"></div></div>

  <div class="toolbar">
    <button class="tab active" id="tab-oracle" onclick="showTab('oracle')">𓂀 Oracle</button>
    <button class="tab" id="tab-tarot" onclick="showTab('tarot')">⊹ Tarot</button>
  </div>

  <section id="seccionOracle">
    <div class="steps" id="stepInd">
      <div class="step-dot active" id="sd1">I</div>
      <div class="step-line"></div>
      <div class="step-dot" id="sd2">II</div>
      <div class="step-line"></div>
      <div class="step-dot" id="sd3">III</div>
    </div>

    <div class="panel" id="step1">
      <span class="panel-tag" id="oracleStep1Tag">Paso I · Identidad</span>
      <div class="field">
        <label id="lblName">Tu Nombre</label>
        <input type="text" id="oName" placeholder="Escribe tu nombre..." />
      </div>
      <div class="field">
        <label id="lblBirth">Fecha de Nacimiento</label>
        <input type="date" id="oBirth" />
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btnContinueOracle" onclick="goStep2()">Continuar ✦</button>
      </div>
    </div>

    <div class="panel hidden" id="step2">
      <span class="panel-tag" id="oracleStep2Tag">Paso II · La Pregunta</span>
      <p id="oracleIntroText" style="font-style:italic;color:rgba(201,168,76,.55);font-size:14px;margin-bottom:18px;line-height:1.7;text-align:center;">
        El oráculo ha preparado una pregunta para ti.<br>Puedes editarla o escribir la tuya.
      </p>
      <div class="field">
        <label id="lblQuestionOracle">Tu Pregunta</label>
        <textarea id="oQuestion" rows="4"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn-ghost" id="btnAnotherQuestion" onclick="refreshQ()">↺ Otra pregunta</button>
        <button class="btn-secondary" id="btnBackOracle" onclick="goStep1()">← Volver</button>
        <button class="btn-primary" id="btnConsultOracle" onclick="consultOracle()">Consultar el Oráculo ✦</button>
      </div>
    </div>

    <div id="step3" class="hidden">
      <div class="oracle-out visible" id="oracleOut">
        <div class="oracle-banner">
          <img id="oCardImg" class="oracle-card-img" src="" alt="Carta del Oráculo" />
          <div class="oracle-archetype" id="oArch">—</div>
          <div class="oracle-role" id="oRole">—</div>
        </div>
        <div class="oracle-fields" id="oFields"></div>
      </div>
      <div class="btn-row" style="margin:18px auto;max-width:460px;">
        <button class="btn-ghost" id="btnNewOracleReading" onclick="resetOracle()">↺ Nueva Lectura</button>
        <button class="btn-secondary" id="btnCopyOracle" onclick="copyOracle()">⎘ Copiar</button>
      </div>
    </div>
  </section>

  <section id="seccionTarot">
    <div class="panel">
      <span class="panel-tag" id="tarotTag">Lectura de Tarot</span>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
        <div style="flex:2;min-width:190px;">
          <label id="lblTarotQuestion">Tu Pregunta</label>
          <input type="text" id="pregunta" placeholder="✦ Escribe tu pregunta..." />
        </div>
        <div style="flex:1;min-width:130px;">
          <label id="lblSpread">Tirada</label>
          <div class="select-wrap">
            <select id="tirada" style="width:100%;">
              <option value="3">3 Cartas</option>
              <option value="5">5 Cartas</option>
              <option value="7">7 Cartas</option>
              <option value="22">22 Arcanos</option>
            </select>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btnDraw" onclick="tirar()">✦ Tirar Cartas</button>
        <button class="btn-secondary" id="btnInterpret" onclick="interpretar()">◈ Interpretar con ChatGPT</button>
        <button class="btn-ghost" id="btnResetTarot" onclick="resetear()">↺ Reset</button>
      </div>
    </div>

    <div id="cartas"></div>

    <div id="resultado">
      <div class="res-hdr" id="tarotResultHeader">✦ LECTURA NERA ✦</div>
      <div id="resultadoTexto"></div>
    </div>

    <div class="btn-row hidden" id="copyTarotRow" style="margin:14px auto;">
      <button class="btn-ghost" id="btnCopiar" onclick="copyTarot()">⎘ Copiar Resultado</button>
    </div>

    <div id="instrucciones"></div>
  </section>
</div>

<div class="modal-overlay" id="mCard">
  <div class="modal">
    <button class="modal-close" onclick="closeM('mCard')">×</button>
    <div id="cardContent"></div>
  </div>
</div>

<script>
// =========================================================
// PEGA TU API AQUÍ. NO SE MUESTRA EN PANTALLA.
// =========================================================
const OPENAI_API_KEY = "PEGA_AQUI_TU_API";
const OPENAI_MODEL = "gpt-4.1-mini";

// =========================================================
// DATOS DE LOS ARCANOS
// =========================================================
const ARCANAS = [

async function openAIChat(prompt){
  if(!OPENAI_API_KEY || OPENAI_API_KEY === 'PEGA_AQUI_TU_API'){
    throw new Error('Falta la API key');
  }
  const response = await fetch('https://api.openai.com/v1/chat/completions', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer ' + OPENAI_API_KEY
    },
    body:JSON.stringify({
      model: OPENAI_MODEL,
      messages:[{role:'user', content: prompt}],
      temperature: 0.9
    })
  });

  const data = await response.json();
  if(!response.ok){
    const msg = data?.error?.message || ('HTTP ' + response.status);
    throw new Error(msg);
  }
  return data.choices?.[0]?.message?.content?.trim() || '';
}

async function consultOracle(){
  const q=document.getElementById('oQuestion').value.trim();
  if(!q) return;

  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  currentStep=3; updateDots();

  const arc=ARCANAS[Math.floor(Math.random()*ARCANAS.length)];
  const index=ARCANAS.indexOf(arc)+1;
  const oCardImg=document.getElementById('oCardImg');
  oCardImg.src='./'+index+'.png';
  oCardImg.style.display='block';
  oCardImg.onerror=function(){ this.style.display='none'; };

  document.getElementById('oArch').textContent = arc.title;
  document.getElementById('oRole').textContent = `${arc.deity} · ${arc.role}`;
  setLoading(document.getElementById('oFields'));

  try{
    const raw = await openAIChat(t().oraclePrompt(oUser.name, oUser.birth, arc, q));
    const clean = raw.replace(/^```json\s*/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const j = JSON.parse(clean);
    renderOracleResponse(j, arc);
  }catch(err){
    renderOracleFallback(arc);
  }
}

function renderOracleResponse(j, arc){
  const labels=t().oracleLabels;
  lastOracleText = `${j.archetype || arc.title}\n${j.role || (arc.deity + ' · ' + arc.role)}\n\n${labels.message.replace(/[✦◈⊹→]/g,'').trim()}: ${j.message}\n\n${labels.shadow.replace(/[✦◈⊹→]/g,'').trim()}: ${j.shadow}\n\n${labels.activation.replace(/[✦◈⊹→]/g,'').trim()}: ${j.activation}\n\n${labels.nextStep.replace(/[✦◈⊹→]/g,'').trim()}: ${j.nextStep}`;
  document.getElementById('oArch').textContent = j.archetype || arc.title;
  document.getElementById('oRole').textContent = j.role || `${arc.deity} · ${arc.role}`;
  document.getElementById('oFields').innerHTML = `
    <div class="o-field msg"><span class="o-lbl">${labels.message}</span><div class="o-txt">${j.message || ''}</div></div>
    <div class="o-field shad"><span class="o-lbl">${labels.shadow}</span><div class="o-txt">${j.shadow || ''}</div></div>

    </div>`;
}

  document.getElementById('step3').classList.add('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('oName').value='';
  document.getElementById('oBirth').value='';
  document.getElementById('oQuestion').value='';
  document.getElementById('oCardImg').src='';
  document.getElementById('oCardImg').style.display='none';
  currentStep=1; updateDots();
}

function copyOracle(){
  navigator.clipboard.writeText(lastOracleText || document.getElementById('oFields').innerText);
  alert(t().copied);
}

function tirar(){
  const n=parseInt(document.getElementById('tirada').value,10);
  let deck=[...Array(22).keys()].map(x=>x+1);
  tiradaActual=[];
  for(let i=0;i<Math.min(n,22);i++){
    const r=Math.floor(Math.random()*deck.length);
    tiradaActual.push(deck[r]);
    deck.splice(r,1);
  }
  mostrarCartas();
  document.getElementById('resultado').classList.remove('visible');
  document.getElementById('copyTarotRow').classList.add('hidden');
}

function mostrarCartas(){
  const cont=document.getElementById('cartas');
  cont.innerHTML='';
  cont.className='';
  const n=tiradaActual.length;
  if(n<=3) cont.classList.add('grid3');
  else if(n<=5) cont.classList.add('grid5');
  else if(n<=7) cont.classList.add('grid7');
  else cont.classList.add('grid22');

  tiradaActual.forEach((c,i)=>{
    const arc=ARCANAS[c-1];
    const div=document.createElement('div');
    div.className='carta';
    div.style.animation='torbellino 4.5s forwards';
    div.style.animationDelay=(i*0.08)+'s';
    div.style.opacity='0';
    div.onclick=()=>showCard(c-1);

    const glow=document.createElement('div'); glow.className='carta-glow';
    const img=document.createElement('img'); img.src='./'+c+'.png'; img.alt=arc.deity; img.onerror=function(){ this.style.display='none'; };
    const sombra=document.createElement('div'); sombra.className='sombraCarta';
    const nombre=document.createElement('div'); nombre.className='nombreCarta'; nombre.textContent=`${arc.n} · ${arc.deity}`;

    div.appendChild(glow); div.appendChild(img); div.appendChild(sombra); div.appendChild(nombre);
    cont.appendChild(div);
    setTimeout(()=>{ nombre.style.display='block'; }, 5400 + i*80);
  });
}

function showCard(idx){
  const a=ARCANAS[idx];
  const labels=t().cardLabels;
  document.getElementById('cardContent').innerHTML = `
    <div class="cd-num">· ${a.n} · ${a.deity} ·</div>
    <div class="cd-name">${a.name}</div>
    <div class="cd-sub">${a.title} · ${a.role}</div>
    <div class="cd-block"><span class="cd-lbl">${labels.essence}</span><div class="cd-txt">${a.essence}</div></div>
    <div class="cd-block"><span class="cd-lbl">${labels.func}</span><div class="cd-txt">${a.func}</div></div>
    <div class="cd-activ">✦ ${a.activation}</div>
    <div class="cd-anc">${a.ancestors}</div>
    <span class="cd-elem">${a.element}</span>`;
  openM('mCard');
}

async function interpretar(){
  if(!tiradaActual.length){ alert(t().alertDraw); return; }
  const pregunta = document.getElementById('pregunta').value.trim() || t().generalReading;
  const nombres = tiradaActual.map(c=>`${ARCANAS[c-1].name} (${ARCANAS[c-1].title})`).join(' · ');
  const res=document.getElementById('resultado');
  const resT=document.getElementById('resultadoTexto');
  res.classList.add('visible');
  resT.textContent='';
  setLoading(resT);

  try{
    const text = await openAIChat(t().tarotPrompt(pregunta, nombres));
    resT.innerHTML = text.replace(/\n/g,'<br>');
  }catch(err){
    resT.textContent = t().apiError;
  }
  document.getElementById('copyTarotRow').classList.remove('hidden');
  res.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function copyTarot(){
  navigator.clipboard.writeText(document.getElementById('resultadoTexto').innerText);
  const b=document.getElementById('btnCopiar');
  const prev=b.textContent;
  b.textContent = idioma==='ES' ? '✓ Copiado' : '✓ Copied';
  setTimeout(()=> b.textContent = t().btnCopyResult, 1800);
}

function resetear(){
  tiradaActual=[];
  document.getElementById('cartas').innerHTML='';
  document.getElementById('resultado').classList.remove('visible');
  document.getElementById('resultadoTexto').innerHTML='';
  document.getElementById('pregunta').value='';
  document.getElementById('copyTarotRow').classList.add('hidden');
}

applyLanguage();
showTab('oracle');
updateDots();
</script>
</body>
